<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cień Śledztwa - System Operacyjny</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'agency-black': 'var(--agency-black)',
              'agency-dark': 'var(--agency-dark)',
              'agency-panel': 'var(--agency-panel)',
              'agency-border': 'var(--agency-border)',
              'agency-text': 'var(--agency-text)',
              'agency-main': 'var(--agency-main)',
              'agency-alert': 'var(--agency-alert)',
              'agency-success': 'var(--agency-success)',
              'agency-danger': 'var(--agency-danger)',
            },
            fontFamily: {
              mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
              sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --agency-black: #000000;
        --agency-dark: #020617;
        --agency-panel: #0f172a;
        --agency-border: #1e293b;
        --agency-text: #94a3b8;
        --agency-main: #0ea5e9;     /* Default Sky Blue */
        --agency-alert: #f59e0b;
        --agency-success: #10b981;
        --agency-danger: #ef4444;
      }

      body {
        background-color: var(--agency-black);
        color: #e2e8f0;
      }
      /* Custom Scrollbar for Agency feel */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--agency-dark); 
      }
      ::-webkit-scrollbar-thumb {
        background: var(--agency-border); 
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155; 
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.4/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react/jsx-runtime": "https://esm.sh/react@^19.2.4/jsx-runtime",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="./index.js"></script>
</body>
</html>
